<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>类目洞察 Pro — AI 电商数据分析</title>
  <link rel="stylesheet" href="/frontend/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <span class="brand-icon">&#9672;</span>
      <span class="brand-text">类目洞察 <em>Pro</em></span>
    </div>
    <form id="analysisForm" class="header-search">
      <input id="keyword" name="keyword" type="text" autocomplete="off" placeholder="搜索关键词，如：防晒衣女 夏季" required>
      <button id="startButton" type="submit">开始分析</button>
    </form>
    <div class="header-actions">
      <button id="exportBtn" class="btn-ghost" type="button">导出报告</button>
      <button id="shareBtn" class="btn-ghost" type="button">分享报告</button>
    </div>
  </header>

  <div id="status" class="status-bar" data-state="idle">等待输入类目关键词</div>

  <main class="app-main">
    <!-- 7 核心指标卡片 -->
    <section id="metricsRow" class="metrics-row">
      <article class="metric-card">
        <span class="metric-label">样本商品数</span>
        <strong id="mcItems" class="metric-value">-</strong>
      </article>
      <article class="metric-card">
        <span class="metric-label">有效价格商品</span>
        <strong id="mcPrice" class="metric-value">-</strong>
      </article>
      <article class="metric-card">
        <span class="metric-label">有效销量商品</span>
        <strong id="mcSales" class="metric-value">-</strong>
      </article>
      <article class="metric-card">
        <span class="metric-label">覆盖店铺数</span>
        <strong id="mcShops" class="metric-value">-</strong>
      </article>
      <article class="metric-card">
        <span class="metric-label">样本销量估算</span>
        <strong id="mcTotalSales" class="metric-value">-</strong>
      </article>
      <article class="metric-card">
        <span class="metric-label">样本销售预估</span>
        <strong id="mcGmv" class="metric-value">-</strong>
      </article>
      <article class="metric-card heat-card">
        <span class="metric-label">类目热度评级</span>
        <div id="mcHeat" class="heat-gauge-wrap">
          <div class="heat-gauge" id="heatGauge"></div>
          <div class="heat-info">
            <strong class="metric-value">-</strong>
            <span class="heat-desc"></span>
          </div>
        </div>
      </article>
    </section>

    <!-- Tab 导航 -->
    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="market">市场概览</button>
      <button class="tab-btn" data-tab="price">价格分析</button>
      <button class="tab-btn" data-tab="competition">竞争格局</button>
      <button class="tab-btn" data-tab="demand">需求洞察</button>
      <button class="tab-btn" data-tab="opportunities">机会与风险</button>
      <button class="tab-btn" data-tab="products">商品列表</button>
    </nav>

    <!-- Tab 内容区 -->
    <section class="tab-content" id="tabContent">
      <!-- 动态渲染 -->
    </section>
  </main>

  <footer class="app-footer">
    <p>数据来源：淘宝搜索结果页样本数据分析，不等同于全平台真实成交数据。</p>
  </footer>

  <script src="/frontend/charts.js"></script>
  <script src="/frontend/renderers.js"></script>
  <script src="/frontend/app.js"></script>
</body>
</html>
